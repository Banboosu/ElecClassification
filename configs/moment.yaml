data:
  csv_path: data/raw/最新多.csv
  delimiter: " "
  id_column: charging_station_id
  sequence_column: charging_powers_str
  label_column: InsertedColumn
  invalid_labels: ["5"]
  max_length: 1024
  min_length: 18
  normalize: zscore
  validation_size: 0.1
  test_size: 0.2
  random_state: 42
  split_path: artifacts/splits/unified_split.json

model:
  model_id: AutonLab/MOMENT-1-large
  config_path: configs/models/moment-1-large.json
  num_channels: 1
  freeze_backbone: true
  unfreeze_last_n_layers: 0

training:
  output_dir: artifacts/moment
  epochs: 50
  batch_size: 32
  # V100 32GB：验证和冻结特征提取不保存反向激活，可以使用更大的 batch。
  evaluation_batch_size: 64
  feature_extraction_batch_size: 64
  # 线性探测缓存后只训练小型分类头。
  cached_feature_batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 0.001
  backbone_learning_rate: 0.00001
  weight_decay: 0.01
  # 6 vCPU 保留 2 核给主进程、CUDA 驱动和系统。
  num_workers: 4
  prefetch_factor: 2
  device: auto
  early_stopping_patience: 7
  early_stopping_min_delta: 0.0001
  scheduler_patience: 3
  scheduler_factor: 0.5
  gradient_clip_norm: 1.0
  amp: true
  fused_optimizer: true
  # 仅在线性探测（backbone 全冻结）时生效，每个 split 只提取一次特征。
  cache_frozen_features: true
  # 成功结束后最佳权重已足够复现测试；删除仅用于断点恢复的大型 latest checkpoint。
  keep_completed_checkpoint: false

tcn_model:
  channels: [64, 64, 128, 128]
  kernel_size: 3
  dropout: 0.3

tcn_training:
  output_dir: artifacts/tcn
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0
  device: auto
  early_stopping_patience: 7
  early_stopping_min_delta: 0.0001
  scheduler_patience: 3
  scheduler_factor: 0.5
  gradient_clip_norm: 1.0
  # V100 上 FP16 扩张卷积可能在训练后期溢出，TCN/CNN 默认使用 FP32。
  amp: false
